  header:
    title: "SecTUI"
    score: "Score: %{score}/100"
    help: "help"
  footer:
    focus: "Focus"
    scan: "Scan"
    help: "Help"
    quit: "Quit"
  sidebar:
    overview: "OVERVIEW"
    modules: "MODULES"
    tools: "TOOLS"
    secstore: "SECSTORE"
