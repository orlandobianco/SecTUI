# SecTUI - English Locale
# All user-facing strings for the SecTUI security hardening tool.

# ---------------------------------------------------------------------------
# App
# ---------------------------------------------------------------------------
app:
  name: "SecTUI"
  description: "Security hardening tool for your server"

# ---------------------------------------------------------------------------
# Common UI strings
# ---------------------------------------------------------------------------
common:
  yes: "Yes"
  no: "No"
  cancel: "Cancel"
  continue: "Continue"
  back: "Back"
  skip: "Skip"
  apply: "Apply"
  error: "Error"
  warning: "Warning"
  success: "Success"
  loading: "Loading..."
  scanning: "Scanning..."
  no_results: "No results"
  confirm: "Confirm"
  done: "Done"

# ---------------------------------------------------------------------------
# Severity labels
# ---------------------------------------------------------------------------
severity:
  info: "Info"
  low: "Low"
  medium: "Medium"
  high: "High"
  critical: "Critical"

# ---------------------------------------------------------------------------
# Scan
# ---------------------------------------------------------------------------
scan:
  running: "Running %{type} scan..."
  complete: "Scan complete"
  no_findings: "No findings. Your system looks good!"
  score_label: "Score"
  findings_label: "Findings"
  modules_scanned: "Modules scanned"
  duration: "Duration"
